name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: astro-frontend
        run: |
          npm ci
          npm run build
        env:
          PUBLIC_WP_URL: ${{ secrets.PUBLIC_WP_URL }}
